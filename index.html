{% extends 'base.html' %}
{% block content %}
<h2>Trending Videos</h2>
<div class="video-grid">
    {% for video in videos %}
    <div class="video-card">
        <a href="{{ url_for('watch', video_id=video.id) }}">
            <img src="{{ video.thumbnail_url }}" alt="{{ video.title }}" class="thumbnail">
        </a>
        <div class="video-info">
            <span class="category-badge">{{ video.category }}</span>
            <h3><a href="{{ url_for('watch', video_id=video.id) }}">{{ video.title }}</a></h3>
            <p>{{ video.description[:80] }}...</p>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
